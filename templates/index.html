<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Multiplayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            color: #776e65;
            text-align: center;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
        }
        h1 { font-size: 44px; margin: 0 0 12px 0; }
        #menu { margin: 12px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        button {
            background: #8f7a66; color: #f9f6f2; border: none;
            padding: 12px 20px; font-size: 16px; font-weight: bold;
            border-radius: 4px; cursor: pointer; transition: background 0.15s ease;
        }
        button:hover { background: #9f8b77; }
        input {
            padding: 12px; font-size: 16px; border: 2px solid #bbada0;
            border-radius: 4px; background: #f9f6f2; color: #776e65;
            text-align: center; font-weight: bold; width: 130px;
        }
        #code-input { text-transform: uppercase; width: 110px; }
        #matchup { font-size: 22px; font-weight: bold; margin: 8px 0; min-height: 26px; }
        #scorebox { font-size: 20px; color: #8f7a66; margin: 4px 0 8px; min-height: 24px; }
        #game-id-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
        #game-id { font-size: 18px; font-weight: bold; }
        #copy-btn { padding: 6px 12px; font-size: 14px; display: none; }
        #status { font-size: 22px; font-weight: bold; margin: 12px; min-height: 26px; }
        #player-symbol { font-size: 18px; color: #8f7a66; margin-bottom: 8px; min-height: 22px; }
        #notice { font-size: 16px; color: #b5533f; margin: 8px 0; min-height: 20px; }
        #board {
            position: relative; display: grid;
            grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px);
            gap: 12px; margin: 20px auto; width: max-content;
            background: #bbada0; padding: 12px; border-radius: 8px;
        }
        .cell {
            width: 100px; height: 100px; background: #cdc1b4; border-radius: 6px;
            font-size: 60px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; color: #f9f6f2; user-select: none;
        }
        @media (hover: hover) { .cell:hover { background: #bdb09f; transform: scale(1.02); } }
        .cell.x { background: #f67c5f; animation: pop 0.2s ease; }
        .cell.o { background: #f2b179; animation: pop 0.2s ease; }
        .cell.fading { opacity: 0.4; }
        .cell.filled { cursor: default; }
        .cell.filled:hover { transform: none; }
        @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #win-line {
            position: absolute; background: #776e65; border-radius: 6px;
            transform-origin: left center; transform: scaleX(0);
            transition: transform 0.4s ease; z-index: 10; pointer-events: none;
        }
        #play-again { background: #f67c5f; font-size: 18px; padding: 15px 30px; }
        #play-again:hover { background: #ff8a6d; }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>

    <div id="matchup"></div>
    <div id="scorebox"></div>

    <div id="menu">
        <input id="name-input" placeholder="Your name" maxlength="12">
        <button onclick="createGame()">New Game</button>
        <input id="code-input" placeholder="CODE" maxlength="4">
        <button onclick="joinGame()">Join</button>
    </div>

    <div id="game-id-wrap">
        <div id="game-id"></div>
        <button id="copy-btn" onclick="copyCode()">Copy</button>
    </div>

    <div id="player-symbol"></div>
    <div id="status">Create or join a game!</div>
    <div id="notice"></div>
    <button id="play-again" onclick="playAgain()" style="display:none;">Play Again</button>
    <div id="board"></div>

    <script>
        const socket = io();
        let gameId = null;
        let mySymbol = null;
        let currentTurn = 'X';
        let names = {X: 'Xavier', O: 'Oliver'};

        window.addEventListener('load', () => { createBoard(); });

        function myName() { return document.getElementById('name-input').value.trim(); }

	function updateHeader(score) {
            const mine = mySymbol || 'X';
            const opp = mine === 'X' ? 'O' : 'X';
            document.getElementById('matchup').innerText = '';
            if (score) {
                document.getElementById('scorebox').innerText =
                    '(' + mine + ') ' + names[mine] + ' ' + score[mine] +
                    ' – ' + score[opp] + ' ' + names[opp] + ' (' + opp + ')';
            }
        }

        function showMenu(show) {
            document.getElementById('menu').style.display = show ? 'flex' : 'none';
            document.getElementById('game-id-wrap').style.display = show ? 'flex' : 'none';
        }

        function createGame() {
            socket.emit('create_game', {name: myName()});
        }
        function joinGame() {
            const id = document.getElementById('code-input').value.toUpperCase();
            socket.emit('join_game', {game_id: id, name: myName()});
        }
        function copyCode() {
            if (!gameId) return;
            navigator.clipboard.writeText(gameId).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = 'Copied!';
                setTimeout(() => { btn.innerText = 'Copy'; }, 1500);
            });
        }

        socket.on('game_created', (data) => {
            gameId = data.game_id;
            mySymbol = data.symbol;
            names = data.names;
            document.getElementById('game-id').innerText = 'Game Code: ' + gameId;
            document.getElementById('copy-btn').style.display = 'inline-block';
            document.getElementById('status').innerText = 'Waiting for opponent...';
            document.getElementById('notice').innerText = '';
            updateHeader(data.score);
        });

        socket.on('game_joined', (data) => {
            mySymbol = data.symbol;
            names = data.names;
            gameId = document.getElementById('code-input').value.toUpperCase();
            updateHeader(data.score);
        });

        socket.on('start_game', (data) => {
            names = data.names;
            showMenu(false);
            document.getElementById('notice').innerText = '';
	    document.getElementById('status').innerText = (mySymbol === 'X') ? "Your turn" : names['X'] + "'s turn";
            updateHeader(data.score);
            createBoard();
        });

        socket.on('move_made', (data) => {
            updateBoard(data.board, data.removed, data.fading);
            currentTurn = data.turn;
	    document.getElementById('status').innerText = (currentTurn === mySymbol) ? "Your turn" : names[currentTurn] + "'s turn";
        });

        socket.on('game_over', (data) => {
            updateBoard(data.board);
            if (data.win_cells) drawWinLine(data.win_cells);
            const youWon = data.winner === mySymbol;
            document.getElementById('status').innerText = youWon ? "You win! 🎉" : names[data.winner] + " wins!";
            updateHeader(data.score);
            document.getElementById('play-again').style.display = 'inline-block';
        });

        socket.on('game_reset', (data) => {
            mySymbol = mySymbol === 'X' ? 'O' : 'X';
            names = data.names;
            currentTurn = 'X';
	    document.getElementById('status').innerText = (mySymbol === 'X') ? "Your turn" : names['X'] + "'s turn";
            document.getElementById('notice').innerText = '';
            document.getElementById('play-again').style.display = 'none';
            updateHeader(data.score);
            createBoard();
        });

        socket.on('opponent_left', (data) => {
            document.getElementById('notice').innerText = data.name + ' left the game.';
            document.getElementById('status').innerText = 'Game ended.';
            document.getElementById('play-again').style.display = 'none';
            showMenu(true);
        });

        socket.on('error', (data) => {
            document.getElementById('notice').innerText = data.message;
        });

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const oldLine = document.getElementById('win-line');
            if (oldLine) oldLine.remove();
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                board.appendChild(cell);
            }
        }

        function makeMove(position) {
            if (currentTurn === mySymbol) {
                socket.emit('make_move', {game_id: gameId, position: position});
            }
        }

        function updateBoard(board, removed, fading) {
            const cells = document.querySelectorAll('.cell');
            if (removed !== null && removed !== undefined) {
                cells[removed].innerText = '';
                cells[removed].className = 'cell';
            }
            board.forEach((val, i) => {
                if (val !== '' && !cells[i].classList.contains(val.toLowerCase())) {
                    cells[i].innerText = val;
                    cells[i].classList.add(val.toLowerCase());
                    cells[i].classList.add('filled');
                }
            });
            cells.forEach(cell => cell.classList.remove('fading'));
            if (fading !== null && fading !== undefined) {
                cells[fading].classList.add('fading');
            }
        }

        function drawWinLine(cells) {
            const board = document.getElementById('board');
            const cellEls = document.querySelectorAll('.cell');
            const first = cellEls[cells[0]];
            const last = cellEls[cells[2]];
            const bRect = board.getBoundingClientRect();
            const r1 = first.getBoundingClientRect();
            const r2 = last.getBoundingClientRect();
            let x1 = r1.left + r1.width/2 - bRect.left;
            let y1 = r1.top + r1.height/2 - bRect.top;
            const x2 = r2.left + r2.width/2 - bRect.left;
            const y2 = r2.top + r2.height/2 - bRect.top;
            const angle = Math.atan2(y2-y1, x2-x1) * 180/Math.PI;
            const rad = angle * Math.PI/180;
            const extend = 45;
            const len = Math.hypot(x2-x1, y2-y1) + extend*2;
            x1 -= Math.cos(rad)*extend;
            y1 -= Math.sin(rad)*extend;
            const line = document.createElement('div');
            line.id = 'win-line';
            line.style.width = len + 'px';
            line.style.height = '8px';
            line.style.left = x1 + 'px';
            line.style.top = (y1 - 4) + 'px';
            line.style.transform = 'rotate(' + angle + 'deg) scaleX(0)';
            board.appendChild(line);
            requestAnimationFrame(() => {
                line.style.transform = 'rotate(' + angle + 'deg) scaleX(1)';
            });
        }

        function playAgain() {
            socket.emit('reset_game', {game_id: gameId});
        }
    </script>
</body>
</html>
