<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Multiplayer</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            color: #776e65;
            text-align: center;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 60px;
            font-weight: bold;
            color: #776e65;
            margin: 0 0 20px 0;
        }
        #menu {
            margin: 20px 0;
        }
        button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.15s ease;
        }
        button:hover {
            background: #9f8b77;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bbada0;
            border-radius: 4px;
            background: #f9f6f2;
            color: #776e65;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
            width: 120px;
        }
        #game-id {
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
            margin: 10px 0;
        }
        #status {
            font-size: 24px;
            font-weight: bold;
            margin: 20px;
            color: #776e65;
        }
        #player-symbol {
            font-size: 18px;
            color: #8f7a66;
            margin-bottom: 10px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 12px;
            margin: 20px auto;
            width: 324px;
            background: #bbada0;
            padding: 12px;
            border-radius: 8px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #cdc1b4;
            border-radius: 6px;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #f9f6f2;
            user-select: none;
        }
	@media (hover: hover) {
            .cell:hover {
                background: #bdb09f;
                transform: scale(1.02);
            }
        }
        .cell.x {
            background: #f67c5f;
            animation: pop 0.2s ease;
        }
        .cell.o {
            background: #f2b179;
            animation: pop 0.2s ease;
        }
	.cell.fading {
            opacity: 0.4;
        }
        .cell.filled {
            cursor: default;
        }
        .cell.filled:hover {
            transform: none;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #play-again {
            background: #f67c5f;
            font-size: 18px;
            padding: 15px 30px;
        }
        #play-again:hover {
            background: #ff8a6d;
        }
	#loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #cdc1b4;
            border-top: 6px solid #8f7a66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 20px;
            color: #776e65;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Connecting...</div>
    </div>
    <h1>Tic-Tac-Toe</h1>
    <div id="menu">
        <button onclick="createGame()">New Game</button>
        <input id="join-input" placeholder="CODE" maxlength="4">
        <button onclick="joinGame()">Join</button>
    </div>
    <div id="game-id"></div>
    <div id="player-symbol"></div>
    <div id="status">Create or join a game!</div>
    <button id="play-again" onclick="playAgain()" style="display:none;">Play Again</button>
    <div id="board"></div>

    <script>
        const socket = io();
        socket.on('connect', () => {
            document.getElementById('loading').classList.add('hidden');
        });
        
        socket.on('disconnect', () => {
            document.getElementById('loading').classList.remove('hidden');
            document.querySelector('.loading-text').innerText = 'Reconnecting...';
        });
	let gameId = null;
        let mySymbol = null;
        let currentTurn = 'X';

        function createGame() {
            socket.emit('create_game');
        }

        function joinGame() {
            const id = document.getElementById('join-input').value.toUpperCase();
            socket.emit('join_game', {game_id: id});
        }

        socket.on('game_created', (data) => {
            gameId = data.game_id;
            mySymbol = data.symbol;
            document.getElementById('game-id').innerText = 'Game Code: ' + gameId;
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
            document.getElementById('status').innerText = 'Waiting for opponent...';
        });

        socket.on('game_joined', (data) => {
            mySymbol = data.symbol;
            gameId = document.getElementById('join-input').value.toUpperCase();
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
        });

        socket.on('start_game', () => {
            document.getElementById('status').innerText = "X's turn";
            createBoard();
        });

	socket.on('move_made', (data) => {
            updateBoard(data.board, data.removed, data.fading, data.fading_symbol);
            currentTurn = data.turn;
            document.getElementById('status').innerText = currentTurn + "'s turn";
        });
        socket.on('game_over', (data) => {
            updateBoard(data.board);
            if (data.winner === 'draw') {
                document.getElementById('status').innerText = "It's a draw!";
            } else {
                const youWon = data.winner === mySymbol;
                document.getElementById('status').innerText = youWon ? "You win! 🎉" : "You lose!";
            }
            document.getElementById('play-again').style.display = 'inline-block';
        });

        socket.on('game_reset', () => {
            mySymbol = mySymbol === 'X' ? 'O' : 'X';
            currentTurn = 'X';
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
            document.getElementById('status').innerText = "X's turn";
            document.getElementById('play-again').style.display = 'none';
            createBoard();
        });

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                board.appendChild(cell);
            }
        }

        function makeMove(position) {
            if (currentTurn === mySymbol) {
                socket.emit('make_move', {game_id: gameId, position: position});
            }
        }

        function updateBoard(board, removed, fading, fadingSymbol) {
            const cells = document.querySelectorAll('.cell');
            
            // Clear removed cell
            if (removed !== null && removed !== undefined) {
                cells[removed].innerText = '';
                cells[removed].className = 'cell';
            }
            
            // Update all cells
            board.forEach((val, i) => {
                if (val !== '' && !cells[i].classList.contains(val.toLowerCase())) {
                    cells[i].innerText = val;
                    cells[i].classList.add(val.toLowerCase());
                    cells[i].classList.add('filled');
                }
            });
            
            // Remove all fading classes first
            cells.forEach(cell => cell.classList.remove('fading'));
            
            // Add fading to next-to-disappear
            if (fading !== null && fading !== undefined) {
                cells[fading].classList.add('fading');
            }
        }

        function playAgain() {
            socket.emit('reset_game', {game_id: gameId});
        }
    </script>
</body>
</html>
