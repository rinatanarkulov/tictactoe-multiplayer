<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe Multiplayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            color: #776e65;
            text-align: center;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin: 0 0 15px 0;
        }
        #menu {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        button:hover {
            background: #9f8b77;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bbada0;
            border-radius: 4px;
            background: #f9f6f2;
            color: #776e65;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
            width: 110px;
        }
        #game-id-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        #game-id {
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
        }
        #copy-btn {
            padding: 6px 12px;
            font-size: 14px;
            display: none;
        }
        #status {
            font-size: 22px;
            font-weight: bold;
            margin: 15px;
            color: #776e65;
        }
        #player-symbol {
            font-size: 18px;
            color: #8f7a66;
            margin-bottom: 10px;
        }
	#board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            margin: 20px auto;
            width: max-content;
            background: #bbada0;
            padding: 12px;
            border-radius: 8px;
        }
	.cell {
            background: #cdc1b4;
            border-radius: 6px;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #f9f6f2;
            user-select: none;
        }
        @media (hover: hover) {
            .cell:hover {
                background: #bdb09f;
                transform: scale(1.02);
            }
        }
        .cell.x {
            background: #f67c5f;
            animation: pop 0.2s ease;
        }
        .cell.o {
            background: #f2b179;
            animation: pop 0.2s ease;
        }
        .cell.fading {
            opacity: 0.4;
        }
        .cell.filled {
            cursor: default;
        }
        .cell.filled:hover {
            transform: none;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
	#win-line {
            position: absolute;
            background: #776e65;
            border-radius: 6px;
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 0.4s ease;
            z-index: 10;
            pointer-events: none;
        }
        #play-again {
            background: #f67c5f;
            font-size: 18px;
            padding: 15px 30px;
        }
        #play-again:hover {
            background: #ff8a6d;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="menu">
        <button onclick="createGame()">New Game</button>
        <input id="join-input" placeholder="CODE" maxlength="4">
        <button onclick="joinGame()">Join</button>
    </div>
    <div id="game-id-wrap">
        <div id="game-id"></div>
        <button id="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div id="player-symbol"></div>
    <div id="status">Create or join a game!</div>
    <button id="play-again" onclick="playAgain()" style="display:none;">Play Again</button>
    <div id="board"></div>

    <script>
        const socket = io();
	window.addEventListener('load', () => { createBoard(); });
        let gameId = null;
        let mySymbol = null;
        let currentTurn = 'X';

        function createGame() {
            socket.emit('create_game');
        }

        function joinGame() {
            const id = document.getElementById('join-input').value.toUpperCase();
            socket.emit('join_game', {game_id: id});
        }

        function copyCode() {
            if (!gameId) return;
            navigator.clipboard.writeText(gameId).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = 'Copied!';
                setTimeout(() => { btn.innerText = 'Copy'; }, 1500);
            });
        }

        socket.on('game_created', (data) => {
            gameId = data.game_id;
            mySymbol = data.symbol;
            document.getElementById('game-id').innerText = 'Game Code: ' + gameId;
            document.getElementById('copy-btn').style.display = 'inline-block';
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
            document.getElementById('status').innerText = 'Waiting for opponent...';
        });

        socket.on('game_joined', (data) => {
            mySymbol = data.symbol;
            gameId = document.getElementById('join-input').value.toUpperCase();
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
        });

        socket.on('start_game', () => {
            document.getElementById('status').innerText = "X's turn";
            createBoard();
        });

        socket.on('move_made', (data) => {
            updateBoard(data.board, data.removed, data.fading, data.fading_symbol);
            currentTurn = data.turn;
            document.getElementById('status').innerText = currentTurn + "'s turn";
        });
        socket.on('game_over', (data) => {
            updateBoard(data.board);
	    if (data.win_cells) drawWinLine(data.win_cells);
            if (data.winner === 'draw') {
                document.getElementById('status').innerText = "It's a draw!";
            } else {
                const youWon = data.winner === mySymbol;
                document.getElementById('status').innerText = youWon ? "You win! 🎉" : "You lose!";
            }
            document.getElementById('play-again').style.display = 'inline-block';
        });

        socket.on('game_reset', () => {
            mySymbol = mySymbol === 'X' ? 'O' : 'X';
            currentTurn = 'X';
            document.getElementById('player-symbol').innerText = 'You are: ' + mySymbol;
            document.getElementById('status').innerText = "X's turn";
            document.getElementById('play-again').style.display = 'none';
            createBoard();
        });

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
	    const oldLine = document.getElementById('win-line');
            if (oldLine) oldLine.remove();
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                board.appendChild(cell);
            }
        }

        function makeMove(position) {
            if (currentTurn === mySymbol) {
                socket.emit('make_move', {game_id: gameId, position: position});
            }
        }

        function updateBoard(board, removed, fading, fadingSymbol) {
            const cells = document.querySelectorAll('.cell');

            if (removed !== null && removed !== undefined) {
                cells[removed].innerText = '';
                cells[removed].className = 'cell';
            }

            board.forEach((val, i) => {
                if (val !== '' && !cells[i].classList.contains(val.toLowerCase())) {
                    cells[i].innerText = val;
                    cells[i].classList.add(val.toLowerCase());
                    cells[i].classList.add('filled');
                }
            });

            cells.forEach(cell => cell.classList.remove('fading'));

            if (fading !== null && fading !== undefined) {
                cells[fading].classList.add('fading');
            }
        }

	function drawWinLine(cells) {
            const board = document.getElementById('board');
            const cellEls = document.querySelectorAll('.cell');
            const first = cellEls[cells[0]];
            const last = cellEls[cells[2]];
            const bRect = board.getBoundingClientRect();
            const r1 = first.getBoundingClientRect();
            const r2 = last.getBoundingClientRect();
            const x1 = r1.left + r1.width/2 - bRect.left;
            const y1 = r1.top + r1.height/2 - bRect.top;
            const x2 = r2.left + r2.width/2 - bRect.left;
            const y2 = r2.top + r2.height/2 - bRect.top;
            const len = Math.hypot(x2-x1, y2-y1);
            const angle = Math.atan2(y2-y1, x2-x1) * 180/Math.PI;
            const line = document.createElement('div');
            line.id = 'win-line';
            line.style.width = len + 'px';
            line.style.height = '8px';
            line.style.left = x1 + 'px';
            line.style.top = (y1 - 4) + 'px';
            line.style.transform = 'rotate(' + angle + 'deg) scaleX(0)';
            board.appendChild(line);
            requestAnimationFrame(() => {
                line.style.transform = 'rotate(' + angle + 'deg) scaleX(1)';
            });
        }

        function playAgain() {
            socket.emit('reset_game', {game_id: gameId});
        }
    </script>
</body>
</html>
