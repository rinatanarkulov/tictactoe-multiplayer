apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictactoe
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tictactoe
  template:
    metadata:
      labels:
        app: tictactoe
    spec:
      containers:
      - name: tictactoe
        image: tictactoe:prod
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: tictactoe-service
  namespace: prod
spec:
  type: NodePort
  selector:
    app: tictactoe
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30503
