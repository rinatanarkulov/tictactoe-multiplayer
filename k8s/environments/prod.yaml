apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictactoe
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tictactoe
  template:
    metadata:
      labels:
        app: tictactoe
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: tictactoe
        image: tictactoe:prod
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: tictactoe-service
  namespace: prod
spec:
  type: NodePort
  selector:
    app: tictactoe
  ports:
  - name: web
    port: 5000
    targetPort: 5000
    nodePort: 30503
